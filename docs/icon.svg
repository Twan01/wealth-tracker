<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0c0e"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="50" y1="12" x2="50" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="shield-stroke" x1="50" y1="12" x2="50" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="26" y1="65" x2="74" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="glass-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5"/>
    </filter>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <radialGradient id="dot-glow" cx="72" cy="31" r="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#6ee7b7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambient" cx="50" cy="45" r="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="100" height="100" rx="22" fill="url(#bg-grad)"/>

  <!-- Ambient light from center -->
  <rect width="100" height="100" rx="22" fill="url(#ambient)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="98" height="98" rx="21" fill="none" stroke="#6ee7b7" stroke-opacity="0.07" stroke-width="0.5"/>

  <!-- Shield - frosted glass fill -->
  <path d="M50 14 L80 26 L80 52 C80 68 50 84 50 84 C50 84 20 68 20 52 L20 26 Z"
        fill="url(#shield-fill)"
        filter="url(#glass-blur)"/>

  <!-- Shield - gradient stroke -->
  <path d="M50 14 L80 26 L80 52 C80 68 50 84 50 84 C50 84 20 68 20 52 L20 26 Z"
        fill="none"
        stroke="url(#shield-stroke)" stroke-width="1.6"
        stroke-linejoin="round"/>

  <!-- Chart line - soft outer glow -->
  <polyline points="28,63 40,50 54,55 72,31"
            stroke="#10b981" stroke-width="7" stroke-opacity="0.25"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none" filter="url(#soft-glow)"/>

  <!-- Chart line - tight glow -->
  <polyline points="28,63 40,50 54,55 72,31"
            stroke="#34d399" stroke-width="4" stroke-opacity="0.4"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none" filter="url(#glow)"/>

  <!-- Chart line - crisp -->
  <polyline points="28,63 40,50 54,55 72,31"
            stroke="url(#line-grad)" stroke-width="2.6"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>

  <!-- Endpoint glow halo -->
  <circle cx="72" cy="31" r="16" fill="url(#dot-glow)"/>

  <!-- Endpoint dot -->
  <circle cx="72" cy="31" r="3.8" fill="#6ee7b7"/>
  <circle cx="72" cy="31" r="1.6" fill="#fff" fill-opacity="0.85"/>
</svg>